name: Weekly Discovery Update

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover new offers
        run: python scripts/discover_new_offers.py --mode weekly

      - name: Discover pricing signals
        run: python scripts/discover_pricing_signals.py --mode weekly
        continue-on-error: true

      - name: Validate discovered entries
        run: python scripts/validate_yaml.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly discovery update"
          branch: auto/weekly-discovery-update
          title: "[Auto] Weekly discovery — new offer candidates + pricing signals"
          body: |
            ## Automated discovery run

            This PR was created automatically by the weekly discovery workflow.

            **What to do:**
            1. Review each candidate in `data/offers.yaml` (look for `status: candidate`)
            2. Review new pricing signals in `data/updates_log.yaml`
            3. Change `status: accepted` for offers worth keeping
            4. Change `status: rejected` for entries to discard
            5. Merge when satisfied with the review

            **Quality checklist:**
            - [ ] No guaranteed income / passive income language
            - [ ] Offer is genuinely AI-native (not just AI-assisted)
            - [ ] Pricing hypotheses have source citations in notes
            - [ ] Compliance notes present for regulated domains
          labels: automated, needs-review
          draft: false
