name: Daily Discovery Update

on:
  # Disabled by default — uncomment to activate
  # schedule:
  #   - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover new offers
        run: python scripts/discover_new_offers.py --mode daily

      - name: Discover pricing signals
        run: python scripts/discover_pricing_signals.py --mode daily
        continue-on-error: true

      - name: Validate discovered entries
        run: python scripts/validate_yaml.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: daily discovery update"
          branch: auto/daily-discovery-update
          title: "[Auto] Daily discovery — new offer candidates"
          body: |
            ## Automated discovery run

            This PR was created automatically by the daily discovery workflow.

            Review each candidate and set `status: accepted` or `status: rejected`.
          labels: automated, needs-review
          draft: false
