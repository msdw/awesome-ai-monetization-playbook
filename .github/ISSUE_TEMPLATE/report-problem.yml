name: Report a Problem
description: Report a broken link, hype language, invented pricing, or quality issue
title: "[PROBLEM] "
labels: ["needs-review"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Problem type
      options:
        - broken-link
        - hype-language
        - invented-pricing
        - outdated-content
        - inaccurate-information
        - ethical-concern
        - other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: File or URL
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
