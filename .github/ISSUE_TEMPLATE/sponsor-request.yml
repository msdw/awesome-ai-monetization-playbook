name: Sponsor Request — Project of the Week
description: Request a sponsored slot in the README
title: "[SPONSOR] "
labels: ["sponsor-request"]
body:
  - type: input
    id: project_name
    attributes:
      label: Project name
    validations:
      required: true

  - type: input
    id: project_url
    attributes:
      label: Project URL
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: One-sentence description
    validations:
      required: true

  - type: textarea
    id: relevance
    attributes:
      label: Why is this relevant to AI builders and consultants?
    validations:
      required: true

  - type: input
    id: contact_email
    attributes:
      label: Contact email
    validations:
      required: true

  - type: checkboxes
    id: eligibility
    attributes:
      label: Eligibility
      options:
        - label: AI-related and genuinely useful
          required: true
        - label: No misleading income claims or spam
          required: true
