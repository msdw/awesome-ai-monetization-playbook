# Sources used for automated monetization & pricing discovery
# Fields:
#   type: github | hn | reddit | producthunt | web | newsletter
#   status: active | candidate | paused
#   search_query: used directly in GitHub/HN API calls
#   url: for web type sources
#   frequency: daily | weekly
#   added_at: ISO date
sources:
  github_saas_pricing:
    type: github
    description: GitHub repos — SaaS pricing models and strategies
    search_query: "saas pricing OR pricing model OR subscription revenue ai"
    frequency: daily
    status: active
    added_at: "2026-05-01"

  github_ai_monetization:
    type: github
    description: GitHub repos — AI monetization patterns and tools
    search_query: "ai monetization OR llm api pricing OR ai revenue model"
    frequency: daily
    status: active
    added_at: "2026-05-26"

  github_awesome_pricing:
    type: github
    description: Awesome pricing and monetization lists
    search_query: "awesome pricing OR awesome saas metrics OR awesome monetization"
    frequency: weekly
    status: active
    added_at: "2026-05-26"

  hn_show_saas:
    type: hn
    description: Hacker News Show HN — SaaS and pricing discussions
    search_query: "Show HN SaaS pricing"
    frequency: daily
    status: active
    added_at: "2026-05-01"

  hn_ask_pricing:
